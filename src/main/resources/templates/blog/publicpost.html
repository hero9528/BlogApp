<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragment/NavBar :: mynavbarlayout(~{:: section})}"
      xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Explore Blogs</title>
</head>
<body>
<section>

    <style>
        :root {
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.8);
            --text: #0f172a;
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        .dark {
            --bg: #020617;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: background 0.4s, color 0.4s;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* Animated Background Glow */
        .bg-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99,102,241,0.3) 0%, rgba(139,92,246,0) 70%);
            top: -100px;
            left: -100px;
            border-radius: 50%;
            z-index: -1;
            animation: floatGlow 10s infinite alternate ease-in-out;
        }
        .bg-glow-2 {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(34,197,94,0.2) 0%, rgba(34,197,94,0) 70%);
            bottom: -150px;
            right: -100px;
            border-radius: 50%;
            z-index: -1;
            animation: floatGlow 12s infinite alternate-reverse ease-in-out;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 100px) scale(1.2); }
        }

        .container {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Set container to be most of the screen height */
        }

        /* New styles for header controls */
        .main-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }

        .controls-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            padding: 20px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 10px 30px var(--shadow);
            backdrop-filter: blur(10px);
        }

        .filter-container {
            position: relative;
        }

        .category-filter {
            padding: 12px 40px 12px 20px;
            border-radius: 30px;
            border: 2px solid transparent;
            background: var(--card);
            color: var(--text);
            font-size: 1rem;
            box-shadow: 0 10px 20px var(--shadow);
            transition: 0.3s;
            backdrop-filter: blur(10px);
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        .filter-container::after { /* Custom dropdown arrow */
            content: '\f078';
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #64748b;
        }

        .reset-filter-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.3s;
            white-space: nowrap;
            margin-left: 10px;
        }

        .reset-filter-link:hover {
            color: var(--secondary);
            text-decoration: underline;
        }

        .search-form-public {
            position: relative;
        }

        .search-form-public .form-control {
            border-radius: 30px;
            padding: 12px 20px 12px 45px;
            background-color: var(--card);
            border: 2px solid transparent;
            color: var(--text);
            transition: all 0.3s;
            width: 250px;
            box-shadow: 0 10px 20px var(--shadow);
            backdrop-filter: blur(10px);
        }

        .category-filter:focus, .search-form-public .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(99,102,241,0.3);
        }

        .search-form-public .search-icon {
            position: absolute;
            top: 50%;
            left: 18px;
            transform: translateY(-50%);
            color: #64748b;
        }
        .search-form-public {
    display: flex;
    align-items: center;
    gap: 10px;
}

.search-btn {
    padding: 10px 18px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.search-btn:hover {
    transform: scale(1.05);
}

        .theme-toggle-public {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: var(--card);
            color: var(--text);
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 10px 20px var(--shadow);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .theme-toggle-public:hover {
            transform: rotate(30deg) scale(1.1);
            background: var(--primary);
            color: white;
        }

        /* Grid Layout */
        .post-grid {
            display: grid;
            align-items: stretch;
            grid-template-columns: repeat(3, 1fr); /* Always 3 columns */
            gap: 35px;
            flex-grow: 1; /* This makes the grid expand and push the pagination down */
        }

        @media (max-width: 1024px) {
            .post-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .post-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Post Card */
        .post-card {
            height: 100%;
            background: var(--card);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 35px var(--shadow);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(50px);
            animation: fadeInUp 0.8s ease forwards;
        }

        .post-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 25px 50px rgba(99,102,241,0.25);
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Staggered Animation Delay */
        .post-card:nth-child(1) { animation-delay: 0.1s; }
        .post-card:nth-child(2) { animation-delay: 0.2s; }
        .post-card:nth-child(3) { animation-delay: 0.3s; }
        .post-card:nth-child(4) { animation-delay: 0.4s; }
        .post-card:nth-child(5) { animation-delay: 0.5s; }
        .post-card:nth-child(6) { animation-delay: 0.6s; }

        /* Card Image */
        .card-img-wrapper {
            position: relative;
            height: 220px;
            overflow: hidden;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .post-card:hover .card-img {
            transform: scale(1.15) rotate(2deg);
        }

        /* Category Badge */
        .category-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 2;
            backdrop-filter: blur(5px);
        }

        /* Card Body */
        .card-body {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-date {
            font-size: 0.85rem;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: color 0.3s;
        }

        .post-card:hover .card-title {
            color: var(--primary);
        }

        .card-desc {
             min-height: 80px;
             max-height: 100px;
             overflow: hidden;
            font-size: 0.85rem; /* Smaller font size */
            opacity: 0.7;
            line-height: 1.6;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3; /* Limit to 3 lines */
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-grow: 1;
        }

        .card-short-desc {
            font-size: 0.95rem; /* Larger font size */
            opacity: 0.9;
            font-style: normal; /* Removed italic */
            line-height: 1.5;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2; /* Limit to 2 lines */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* See More Button */
        .see-more {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            font-size: 1rem;
            margin-top: auto;
            transition: all 0.3s ease;
            padding: 10px 0;
        }

        .see-more i {
            transition: transform 0.3s ease;
        }

        .see-more:hover {
            color: var(--secondary);
            gap: 15px;
        }

        .see-more:hover i {
            transform: translateX(5px);
        }

        /* Pagination */
        .pagination-container {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            animation: fadeInUp 1s ease forwards;
            animation-delay: 0.5s;
            opacity: 0;
            margin-top: auto;
            flex-shrink: 0; /* Prevent the pagination from shrinking */
        }

        .pagination {
            display: flex;
            gap: 10px;
            list-style: none;
            padding: 10px 20px;
            border-radius: 20px;
            background: var(--card);
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 30px var(--shadow);
        }

        .pagination li a {
            padding: 10px 18px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            transition: 0.3s;
            display: block;
        }

        .pagination li a:hover {
            background: rgba(99,102,241,0.1);
            color: var(--primary);
            transform: translateY(-3px);
        }

        .pagination li.active a {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 10px 20px rgba(99,102,241,0.4);
            transform: scale(1.1);
        }

        .pagination li.disabled a {
            pointer-events: none;
            opacity: 0.4;
        }

    </style>

    <!-- Background Animations -->
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="container">

        <h1 class="main-title">Discover Amazing Stories</h1>

        <div class="controls-wrapper">
            <!-- Category Filter -->
            <div class="filter-container">
                <select id="categoryFilter" class="category-filter" onchange="applyFilters()">
                    <option value="" th:selected="${selectedCategoryId == null}">All Categories</option>
                    <option th:each="category : ${categories}" 
                            th:value="${category.id}" 
                            th:text="${category.name}" 
                            th:selected="${selectedCategoryId != null and selectedCategoryId == category.id}">
                    </option>
                </select>
                <a th:if="${selectedCategoryId != null}" th:href="@{/}" class="reset-filter-link">Show All</a>
            </div>

            <!-- Search Form -->
            <form class="search-form-public" th:action="@{/}" method="get">
                <input type="hidden" name="categoryId" id="hiddenCategory">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input class="form-control" type="search" name="search" placeholder="Search..." th:value="${search}">
                <button type="submit" class="search-btn">
                    Search
                </button>
            </form>

            <!-- Theme Toggle -->
            <button class="theme-toggle-public" onclick="toggleTheme()" id="themeBtn" title="Toggle Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
        
        <!-- Post Grid -->
        <div class="post-grid">

            <div th:if="${postPages.content.size() == 0}"
                 style="grid-column: span 3; text-align:center; padding:40px; font-size:1.2rem; font-weight:600;">

                🚫 No posts found in this category <br><br>
                <span style="font-size:1rem; opacity:0.7;">Be the first to post 🚀</span>

            </div>
            <!-- Single Post Card (Loop this) -->
            <div class="post-card" th:each="post : ${postPages.content}">
                
                <!-- Image & Category -->
                <div class="card-img-wrapper">
                    <div class="category-badge" th:if="${post.category}" th:text="${post.category.name}">Technology</div>
                    <img th:if="${post.postImageName}" th:src="@{'/postfiles/' + ${post.id} + '/' + ${post.postImageName}}" alt="Post Image" class="card-img">
                    <img th:unless="${post.postImageName}" src="https://via.placeholder.com/400x250?text=No+Image" alt="Default Image" class="card-img">
                </div>

                <!-- Content -->
                <div class="card-body">
                    <div class="card-date">
                        <i class="fa-regular fa-calendar"></i>
                        <span th:text="${#temporals.format(post.createdOn, 'dd MMM, yyyy')}">12 Oct, 2023</span>
                    </div>
                    
                    <h2 class="card-title" th:text="${post.title}">The Future of Artificial Intelligence in 2024</h2>

                    <p class="card-short-desc" th:text="${post.shortDescription}">
                        A brief summary of the post goes here...
                    </p>

                    <div class="card-desc" th:utext="${post.content}"></div>

                    <!-----------  READ ALL FULL LINK ------->
                    <a th:href="@{'/blogfullview/'+${post.id}+'/'+${post.url}}" class="see-more">
                        Read Full Article <i class="fa-solid fa-arrow-right-long"></i>
                    </a>
            </div>

        </div>

        <!-- Pagination -->
        <div class="pagination-container" th:if="${postPages != null and postPages.totalPages > 1}">
            <ul class="pagination">
                <!-- Previous -->
                <li th:classappend="${currentpage == 0} ? 'disabled'">
                    <a th:if="${currentpage > 0}"th:href="@{/(pageNo=${currentpage - 1}, search=${search}, categoryId=${selectedCategoryId})}">
                        <i class="fa-solid fa-chevron-left"></i>
                    </a>
                    <a th:if="${currentpage == 0}" href="#">
                        <i class="fa-solid fa-chevron-left"></i>
                    </a>
                </li>

                <!-- Page Numbers -->
                <li th:each="i : ${#numbers.sequence(0, postPages.totalPages - 1)}" th:classappend="${currentpage == i} ? 'active'">
                    <a th:href="@{/(pageNo=${i}, search=${search}, categoryId=${selectedCategoryId})}" th:text="${i + 1}"></a>
                </li>

                <!-- Next -->
                <li th:classappend="${currentpage == postPages.totalPages - 1} ? 'disabled'">
                    <a th:if="${currentpage < postPages.totalPages - 1}" th:href="@{/(pageNo=${currentpage + 1}, search=${search}, categoryId=${selectedCategoryId})}">
                        <i class="fa-solid fa-chevron-right"></i>
                    </a>
                     <a th:if="${currentpage == postPages.totalPages - 1}" href="#">
                        <i class="fa-solid fa-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </div>
        </div>
    </div>

    <script>
        // Theme Toggle Logic
        const themeBtn = document.getElementById('themeBtn');
        if (themeBtn) {
            const icon = themeBtn.querySelector('i');
            // Set initial theme based on localStorage
            if (localStorage.getItem("theme") === "dark") {
                document.body.classList.add("dark");
                if(icon) icon.classList.replace('fa-moon', 'fa-sun');
            }
            window.toggleTheme = function() {
                document.body.classList.toggle("dark");
                if (document.body.classList.contains("dark")) {
                    localStorage.setItem("theme", "dark");
                    if(icon) icon.classList.replace('fa-moon', 'fa-sun');
                } else {
                    localStorage.setItem("theme", "light");
                    if(icon) icon.classList.replace('fa-sun', 'fa-moon');
                }
            }
        }

        // Category Filter Logic
       function applyFilters() {
    const categoryId = document.getElementById('categoryFilter').value;
    const search = document.querySelector('input[name="search"]').value;

    let url = `/?`;

    if (categoryId && categoryId !== 'all') {
        url += `categoryId=${categoryId}&`;
    }

    if (search) {
        url += `search=${search}`;
    }

    window.location.href = url;
}
        
        // Attach event listener to the filter control
        const categorySelect = document.getElementById('categoryFilter');
        if(categorySelect) {
            categorySelect.addEventListener('change', applyFilters);
        }

         document.querySelector('.search-form-public').addEventListener('submit', function() {
               const categoryId = document.getElementById('categoryFilter').value;
                document.getElementById('hiddenCategory').value = categoryId;
         });
        // --- Strip Images from Content Preview ---
        document.addEventListener('DOMContentLoaded', function() {
            const contentDivs = document.querySelectorAll('.card-desc');
            contentDivs.forEach(div => {
                let html = div.innerHTML;
                // Remove <img> tags
                let textOnly = html.replace(/<img[^>]*>/g, "");
                div.innerHTML = textOnly;
            });
        });

    </script>
 </section>
</body>
</html>
