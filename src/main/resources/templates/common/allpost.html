<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragment/NavBar :: mynavbarlayout(~{:: section})}">

<head>
    <meta charset="UTF-8">
    <title>All Posts</title>

    <!-- Icons -->

</head>

<body>
<section>

    <style>
        :root{
            --bg:#f1f5f9;
            --card:rgba(255,255,255,0.6);
            --text:#0f172a;
            --primary:#6366f1;
        }

        .dark{
            --bg:#020617;
            --card:rgba(30,41,59,0.6);
            --text:#e2e8f0;
        }

        body{
            background: radial-gradient(circle at top,#6366f1,#020617);
            color:var(--text);
            transition:0.4s;
        }

        /* Glow */
        .glow{
            position:absolute;
            width:300px;
            height:300px;
            background:rgba(99,102,241,0.4);
            filter:blur(100px);
            top:10%;
            left:10%;
            animation:move 10s infinite alternate;
        }
        @keyframes move{
            to{ transform:translate(200px,150px);}
        }

        /* Container */
        .container{
            max-width:1300px;
            margin:40px auto;
        }

        /* Card */
        .card{
            backdrop-filter: blur(18px);
            background:var(--card);
            border-radius:25px;
            padding:25px;
            box-shadow:0 30px 80px rgba(0,0,0,0.4);
        }

        /* Topbar */
        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        h2{
            background: linear-gradient(135deg,#22c55e,#3b82f6);
            -webkit-background-clip:text;
            color:transparent;
        }

        /* Search */
        .search{
            padding:10px;
            border-radius:12px;
            border:none;
            width:250px;
        }

        /* Toggle */
        .toggle{
            border:none;
            padding:8px 12px;
            border-radius:12px;
            background:var(--primary);
            color:white;
            cursor:pointer;
        }

        /* TABLE WRAPPER 🔥 */
        .table-wrapper{
            max-height:500px;
            overflow-y:auto;
            border-radius:15px;
        }

        /* Scrollbar */
        .table-wrapper::-webkit-scrollbar{
            width:8px;
        }
        .table-wrapper::-webkit-scrollbar-thumb{
            background:#6366f1;
            border-radius:10px;
        }

        /* Table */
        table{
            width:100%;
            border-collapse:separate;
            border-spacing:0 10px;
        }

        /* Sticky header */
        thead th{
            position:sticky;
            top:0;
            background:rgba(99,102,241,0.2);
            backdrop-filter:blur(10px);
            text-align: right;
            padding-right: 130px; /* आप इस वैल्यू को कम-ज़्यादा कर सकते हैं */
        }

        /* Rows */
        tbody tr{
            background:rgba(255,255,255,0.05);
            transition:0.3s;
        }

        tbody tr:hover{
            transform:scale(1.02);
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        /* Cells */
        td,th{
            padding:14px;
        }



        /* Status */
        .badge{
            padding:5px 12px;
            border-radius:20px;
            font-size:12px;
        }
        .approved{ background:#22c55e; color:#fff;}
        .pending{ background:#facc15; color:#000;}
        .rejected{ background:#ef4444; color:#fff;}

        /* Actions */
        .actions{
            display:flex;
            justify-content:flex-end;
            gap:10px;
            margin-right:70px
        }

        .action-btn{
            position: relative;
            width:38px;
            height:38px;
            border-radius:12px;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            background:rgba(255,255,255,0.08);
            transition:0.3s;
        }

        .action-btn:hover{
            transform:translateY(-4px) scale(1.1);
            box-shadow:0 10px 25px rgba(0,0,0,0.4);
        }

        /* Tooltip */
        .action-btn::after{
            content:attr(data-title);
            position:absolute;
            bottom:120%;
            left:50%;
            transform:translateX(-50%);
            background:#000;
            color:#fff;
            padding:4px 8px;
            border-radius:6px;
            font-size:10px;
            opacity:0;
            transition:0.3s;
        }

        /* Truncate long text */
        .truncate {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px; /* आप इस चौड़ाई को एडजस्ट कर सकते हैं */
        }
        .action-btn:hover::after{
            opacity:1;
        }

        /* Colors */
        .view{ color:#38bdf8;}
        .edit{ color:#22c55e;}
        .delete{ color:#ef4444;}
        .approve{ color:#6366f1;}
        .reject{ color:#f97316;}

.pagination-container {
    margin-top: 30px;
    display: flex;
    justify-content: center;
}

.pagination {
    display: flex;
    gap: 10px;
    list-style: none;
    padding: 10px 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
}

.pagination li a {
    padding: 10px 15px;
    border-radius: 10px;
    text-decoration: none;
    color: #6366f1;
    font-weight: 600;
    transition: 0.3s;
}

.pagination li a:hover {
    background: #6366f1;
    color: white;
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 8px 20px rgba(99,102,241,0.4);
}

.pagination li.active a {
    background: linear-gradient(135deg,#6366f1,#8b5cf6);
    color: white;
    box-shadow: 0 10px 25px rgba(99,102,241,0.5);
    transform: scale(1.1);
}

.pagination li.disabled a {
    pointer-events: none;
    opacity: 0.4;
}
    </style>

    <div class="glow"></div>

    <div class="container">
        <div class="card">

            <!-- TOP -->
            <div class="topbar">
                <h2>🚀 All Posts Dashboard</h2>

                <div>
                    <input type="text" class="search" placeholder="Search...">
                    <button class="toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
                </div>
            </div>

            <!-- TABLE WITH SCROLL -->
            <div class="table-wrapper">



                <table>

                    <thead>
                    <tr>
                        <th>S.No</th>
                        <th>Post Title</th>
                        <th>Short Desc</th>
                        <th>Posted On</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="post,stat : ${postPages.content}">
                        <td th:text="${stat.count}"></td>

                        <!-- POST TITLE ONLY -->
                        <td>
                            <span style="font-weight:600;" th:text="${post.title}"></span>
                        </td>

                        <!-- DESC -->
                        <td>
                            <div class="truncate" th:text="${post.shortDescription}"></div>
                        </td>

                        <!-- DATE -->
                        <td th:text="${#temporals.format(post.createdOn, 'dd-MMM-yyyy hh:mm a')}"></td>

                        <!-- STATUS -->
                        <td>
        <span class="badge"
              th:classappend="${post.status=='APPROVED'} ? 'approved' :
              (${post.status=='REJECTED'} ? 'rejected' : 'pending')"
              th:text="${post.status}">
        </span>
                        </td>

                        <!-- ACTIONS -->
                        <td>
                            <div class="actions">

                                <!-- View Button -->
                                <a th:href="@{'/blogdashborad/allPost/view/' + ${post.id}}" class="action-btn view" data-title="View">
                                    <i class="fa-solid fa-eye"></i>
                                </a>

                                <!-- Edit Button -->
                                <a th:href="@{'/blogdashborad/updatePost/' + ${post.id}}" class="action-btn edit" data-title="Edit">
                                    <i class="fa-solid fa-pen"></i>
                                </a>

                                <!-- Delete Button -->
                                <div class="action-btn delete" data-title="Delete" th:onclick="'confirmDelete(' + ${post.id} + ', ' + ${currentpage} + ')'" style="cursor:pointer;">
                                    <i class="fa-solid fa-trash"></i>
                                </div>

                                <!-- Approve Button: Show if status is PENDING or REJECTED -->
                                <a sec:authorize="hasAuthority('ADMIN')" th:if="${post.status == 'PENDING' or post.status == 'REJECTED'}" th:href="@{'/blogdashborad/approvePost'(postId=${post.id}, status='APPROVED', pageNo=${currentpage})}" class="action-btn approve" data-title="Approve">
                                    <i class="fa-solid fa-check"></i>
                                </a>

                                <!-- Reject Button: Show if status is PENDING or APPROVED -->
                                <a sec:authorize="hasAuthority('ADMIN')" th:if="${post.status == 'PENDING' or post.status == 'APPROVED'}" th:href="@{'/blogdashborad/rejectPost'(postId=${post.id}, status='REJECTED', pageNo=${currentpage})}" class="action-btn reject" data-title="Reject">
                                    <i class="fa-solid fa-xmark"></i>
                                </a>

                            </div>
                        </td>
                    </tr>

                    </tbody>

                </table>

            </div>
            <div class="pagination-container" th:if="${postPages.totalPages > 1}">
                <ul class="pagination">

                    <!-- Previous -->
                    <li th:classappend="${currentpage == 0} ? 'disabled'">
                        <a th:href="@{/blogdashborad/allPost(pageNo=${currentpage - 1})}">⟨</a>
                    </li>

                    <!-- Page Numbers -->
                    <li th:each="i : ${#numbers.sequence(0, postPages.totalPages - 1)}"
                        th:classappend="${currentpage == i} ? 'active'">
                        <a th:href="@{/blogdashborad/allPost(pageNo=${i})}"
                           th:text="${i + 1}"></a>
                    </li>

                    <!-- Next -->
                    <li th:classappend="${currentpage == postPages.totalPages - 1} ? 'disabled'">
                        <a th:href="@{/blogdashborad/allPost(pageNo=${currentpage + 1})}">⟩</a>
                    </li>

                </ul>
            </div>
        </div>

    </div>

    <!-- Success Message Hidden Div -->
    <div th:if="${msg}" id="successMessage" th:text="${msg}" style="display:none;"></div>

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        // Show Success Message Popup
        window.onload = function () {
            let msg = document.getElementById("successMessage");
            if (msg) {
                Swal.fire({
                    title: 'Success!',
                    text: msg.innerText,
                    icon: 'success',
                    confirmButtonText: 'OK'
                });
            }
        };

        // Theme
        if(localStorage.getItem("theme")==="dark"){
            document.body.classList.add("dark");
            themeBtn.innerText="☀️";
        }

        function toggleTheme(){
            document.body.classList.toggle("dark");

            if(document.body.classList.contains("dark")){
                localStorage.setItem("theme","dark");
                themeBtn.innerText="☀️";
            } else {
                localStorage.setItem("theme","light");
                themeBtn.innerText="🌙";
            }
        }

        // Delete
        function confirmDelete(id, pageNo){
            Swal.fire({
                title: 'Are you sure?',
                text: "Are you sure you want to delete this post? This will delete the post data and its image permanently.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#6b7280',
                confirmButtonText: 'Yes, delete it!',
                cancelButtonText: 'No, cancel'
            }).then((result)=>{
                if(result.isConfirmed){
                    // Corrected URL to match the PostController mapping
                    window.location.href = '/blogdashborad/deletePost/' + id + '?pageNo=' + pageNo;
                }
            });
        }

        // Reject
        function confirmReject(id){
            Swal.fire({
                title: 'Reject Post?',
                text: "Are you sure?",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#f97316',
                confirmButtonText: 'Reject'
            }).then((result)=>{
                if(result.isConfirmed){
                    window.location.href = '/post/reject/' + id;
                }
            });
        }

    </script>

</section>
</body>
</html>
