<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragment/NavBar :: mynavbarlayout(~{:: section})}">

<head>
    <meta charset="UTF-8">
    <title>View Post</title>
</head>

<body>
<section>

    <style>
        :root {
            --bg: #f1f5f9;
            --card: rgba(255, 255, 255, 0.6);
            --text: #0f172a;
            --primary: #6366f1;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        .dark {
            --bg: #020617;
            --card: rgba(30, 41, 59, 0.6);
            --text: #e2e8f0;
            --shadow: rgba(0, 0, 0, 0.6);
        }

        body {
            background: radial-gradient(circle at top, #6366f1, #020617);
            color: var(--text);
            transition: 0.4s;
            font-family: 'Poppins', sans-serif;
        }

        /* Glow Animation */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(99, 102, 241, 0.4);
            filter: blur(100px);
            top: 10%;
            left: 10%;
            animation: move 10s infinite alternate;
            z-index: -1;
        }

        @keyframes move {
            to {
                transform: translate(200px, 150px);
            }
        }

        /* Container */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        /* Post Card */
        .post-card {
            backdrop-filter: blur(18px);
            background: var(--card);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 30px 80px var(--shadow);
            position: relative;
        }

        /* Toggle Button */
        .toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            border: none;
            padding: 8px 12px;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-size: 18px;
        }

        /* Back Button */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            border: none;
            padding: 8px 12px;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-size: 18px;
            transition: transform 0.3s ease;
        }

        .back-btn:hover {
            transform: scale(1.1);
        }

        /* Post Header */
        .post-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .post-category {
            background: linear-gradient(135deg, #22c55e, #3b82f6);
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .post-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .post-meta {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.9rem;
            color: var(--text);
            opacity: 0.8;
        }

        /* Post Image */
        .post-image {
            width: 100%;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .post-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .post-image:hover img {
            transform: scale(1.05);
        }

        /* Post Short Description */
        .post-short-desc {
            font-size: 1.1rem;
            font-style: italic;
            text-align: center;
            padding: 20px;
            margin-bottom: 25px;
            border-left: 4px solid var(--primary);
            background: rgba(99, 102, 241, 0.1);
            border-radius: 0 10px 10px 0;
        }

        /* Post Content */
        .post-content {
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .break-word {
            word-wrap: break-word;
            word-break: break-word;
        }

        /* Responsive Images inside Post Content */
        .post-content img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: block;
        }

        /* Section Labels */
        .section-label {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
        }

    </style>

    <div class="glow"></div>

    <div class="container">
        <div class="post-card">

            <button class="back-btn" onclick="goBack()" title="Go Back">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <button class="toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

            <!-- Post Header -->
            <div class="post-header">
                <div class="post-category" th:if="${post.category}">
                    <span style="font-size: 1rem; color: var(--text); font-weight: normal; text-transform: none;">Category: </span>
                    <span th:text="${post.category.name}"></span>
                </div>
                <div class="section-label" style="margin-bottom: 0; border: none;">Title:</div>
                <h1 class="post-title" th:text="${post.title}"></h1>
                <div class="post-meta">
                    <span>
                        <i class="fa-solid fa-calendar-days"></i>
                        Posted on <span th:if="${post.createdOn}" th:text="${#temporals.format(post.createdOn, 'dd MMM, yyyy')}"></span>
                    </span>
                </div>
            </div>

            <!-- Post Image -->
            <div class="section-label" th:if="${post.postImageName}">Image:</div>
            <div class="post-image" th:if="${post.postImageName}">
                <img th:src="@{'/postfiles/' + ${post.id} + '/' + ${post.postImageName}}" alt="Post Image">
            </div>

            <!-- Short Description -->
            <div class="section-label" th:if="${post.shortDescription}">Short Description:</div>
            <div class="post-short-desc" th:if="${post.shortDescription}" th:text="${post.shortDescription}">
            </div>

            <!-- Main Content -->
            <div class="section-label">Content:</div>
            <div class="post-content break-word" th:utext="${post.content}">
            </div>

        </div>
    </div>

    <script>
        function goBack() {
            window.history.back();
        }

        // Theme Toggle
        const themeBtn = document.getElementById('themeBtn');
        if (localStorage.getItem("theme") === "dark") {
            document.body.classList.add("dark");
            themeBtn.innerText = "☀️";
        }

        function toggleTheme() {
            document.body.classList.toggle("dark");
            if (document.body.classList.contains("dark")) {
                localStorage.setItem("theme", "dark");
                themeBtn.innerText = "☀️";
            } else {
                localStorage.setItem("theme", "light");
                themeBtn.innerText = "🌙";
            }
        }
    </script>

</section>
</body>
</html>
