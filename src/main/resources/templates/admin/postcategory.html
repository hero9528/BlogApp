<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragment/NavBar :: mynavbarlayout(~{:: section})}">

<head>
    <meta charset="UTF-8">
    <title>Add Category</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

<section>

    <style>
        :root {
            --bg: #f8fafc;
            --card: rgba(255,255,255,0.7);
            --text: #1e293b;
            --primary: #6366f1;
        }

        .dark {
            --bg: #0f172a;
            --card: rgba(30,41,59,0.7);
            --text: #e2e8f0;
        }

        body {
            background: linear-gradient(135deg,#e0e7ff,#f8fafc);
            color: var(--text);
            transition: 0.4s;
        }

        .container {
            max-width: 700px;
            margin: 60px auto;
        }

        .card {
            backdrop-filter: blur(14px);
            background: var(--card);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            animation: fade 0.7s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            transition: 0.3s;
            box-shadow: 0 25px 70px rgba(0,0,0,0.25);
        }

        @keyframes fade {
            from {opacity:0; transform: translateY(30px);}
            to {opacity:1; transform: translateY(0);}
        }

        .topbar {
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:25px;
        }

        .toggle {
            cursor:pointer;
            padding:8px 12px;
            border-radius:10px;
            background: var(--primary);
            color:white;
            border:none;
        }

        .input-box { position:relative; }

        input {
            width:100%;
            padding:14px;
            border-radius:12px;
            border:1px solid #ddd;
            background:transparent;
            color: var(--text);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow:0 0 12px rgba(99,102,241,0.4);
        }

        label {
            position:absolute;
            top:14px;
            left:14px;
            color:#777;
            transition:0.3s;
            pointer-events:none;
        }

        input:focus + label,
        input:not(:placeholder-shown) + label {
            top:-8px;
            font-size:12px;
            background: var(--card);
            padding:0 5px;
            color: var(--primary);
        }

        .text-danger {
            color: red;
            font-size:14px;
            margin-top:5px;
        }

        button.submit {
            margin-top:25px;
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background: linear-gradient(135deg,#6366f1,#8b5cf6);
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
            background-size:200% 200%;
            animation: gradientMove 4s ease infinite;
        }

        @keyframes gradientMove {
            0% {background-position:0% 50%;}
            50% {background-position:100% 50%;}
            100% {background-position:0% 50%;}
        }

        button.submit:hover {
            transform:translateY(-2px);
            box-shadow:0 10px 30px rgba(99,102,241,0.4);
        }

    </style>

    <div class="container">

        <div class="card">

            <!-- Top -->
            <div class="topbar">
                <h2>✨ Add Category</h2>
                <button class="toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
            </div>

            <!-- Hidden Messages -->
            <div th:if="${msg}" id="successMessage" th:text="${msg}" style="display:none;"></div>
            <div th:if="${error}" id="errorMessage" th:text="${error}" style="display:none;"></div>

            <!-- FORM -->
            <form th:action="@{/admin/category/save}" method="post" th:object="${category}">

                <div class="input-box">
                    <input type="text" th:field="*{name}" placeholder=" ">
                    <label>Category Name</label>

                    <!-- Validation -->
                    <div class="text-danger"
                         th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}">
                    </div>
                </div>

                <button class="submit">🚀 Save Category</button>

            </form>

        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            let msg = document.getElementById("successMessage");
            let error = document.getElementById("errorMessage");

            if (msg && msg.textContent.trim() !== "") {
                Swal.fire({
                    title: 'Success!',
                    text: msg.textContent,
                    icon: 'success',
                    confirmButtonText: 'OK'
                });
            }

            if (error && error.textContent.trim() !== "") {
                Swal.fire({
                    title: 'Error!',
                    text: error.textContent,
                    icon: 'error',
                    confirmButtonText: 'OK'
                });
            }

        });
    </script>

</section>

</body>
</html>
