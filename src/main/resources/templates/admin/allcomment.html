<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragment/NavBar :: mynavbarlayout(~{:: section})}">

<head>
    <meta charset="UTF-8">
    <title>All Comments</title>
</head>

<body>
<section>

    <style>
        :root{
            --bg:#f1f5f9;
            --card:rgba(255,255,255,0.6);
            --text:#0f172a;
            --primary:#6366f1;
        }

        .dark{
            --bg:#020617;
            --card:rgba(30,41,59,0.6);
            --text:#e2e8f0;
        }

        body{
            background: radial-gradient(circle at top,#6366f1,#020617);
            color:var(--text);
            transition:0.4s;
        }

        /* Glow */
        .glow{
            position:absolute;
            width:300px;
            height:300px;
            background:rgba(99,102,241,0.4);
            filter:blur(100px);
            top:10%;
            left:10%;
            animation:move 10s infinite alternate;
        }
        @keyframes move{
            to{ transform:translate(200px,150px);}
        }

        /* Container */
        .container{
            max-width:1300px;
            margin:40px auto;
        }

        /* Card */
        .card{
            backdrop-filter: blur(18px);
            background:var(--card);
            border-radius:25px;
            padding:25px;
            box-shadow:0 30px 80px rgba(0,0,0,0.4);
        }

        /* Topbar */
        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        h2{
            background: linear-gradient(135deg,#f59e0b,#ef4444);
            -webkit-background-clip:text;
            color:transparent;
        }

        /* Search */
        .search{
            padding:10px;
            border-radius:12px;
            border:none;
            width:250px;
        }

        /* Toggle */
        .toggle{
            border:none;
            padding:8px 12px;
            border-radius:12px;
            background:var(--primary);
            color:white;
            cursor:pointer;
        }

        /* TABLE WRAPPER */
        .table-wrapper{
            max-height:500px;
            overflow-y:auto;
            border-radius:15px;
        }

        /* Scrollbar */
        .table-wrapper::-webkit-scrollbar{
            width:8px;
        }
        .table-wrapper::-webkit-scrollbar-thumb{
            background:#6366f1;
            border-radius:10px;
        }

        /* Table */
        table{
            width:100%;
            border-collapse:separate;
            border-spacing:0 10px;
        }

        thead th{
            position:sticky;
            top:0;
            background:rgba(99,102,241,0.2);
            backdrop-filter:blur(10px);
            text-align: left;
            padding: 14px;
        }

        tbody tr{
            background:rgba(255,255,255,0.05);
            transition:0.3s;
        }

        tbody tr:hover{
            transform:scale(1.02);
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        td,th{
            padding:14px;
        }

        /* Truncate long text */
        .truncate {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px;
        }

        /* Actions */
        .actions{
            display:flex;
            justify-content:flex-start;
            gap:10px;
        }

        .action-btn{
            position: relative;
            width:38px;
            height:38px;
            border-radius:12px;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            background:rgba(255,255,255,0.08);
            transition:0.3s;
        }

        .action-btn:hover{
            transform:translateY(-4px) scale(1.1);
            box-shadow:0 10px 25px rgba(0,0,0,0.4);
        }

        .action-btn::after{
            content:attr(data-title);
            position:absolute;
            bottom:120%;
            left:50%;
            transform:translateX(-50%);
            background:#000;
            color:#fff;
            padding:4px 8px;
            border-radius:6px;
            font-size:10px;
            opacity:0;
            transition:0.3s;
        }

        .action-btn:hover::after{
            opacity:1;
        }

        .edit{ color:#22c55e;}
        .delete{ color:#ef4444;}

        /* Pagination Styles */
        .pagination-container {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }
        .pagination {
            display: flex;
            gap: 10px;
            list-style: none;
            padding: 10px 15px;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .pagination li a {
            padding: 10px 15px;
            border-radius: 10px;
            text-decoration: none;
            color: #6366f1;
            font-weight: 600;
            transition: 0.3s;
        }
        .pagination li a:hover {
            background: #6366f1;
            color: white;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 20px rgba(99,102,241,0.4);
        }
        .pagination li.active a {
            background: linear-gradient(135deg,#6366f1,#8b5cf6);
            color: white;
            box-shadow: 0 10px 25px rgba(99,102,241,0.5);
            transform: scale(1.1);
        }
        .pagination li.disabled a {
            pointer-events: none;
            opacity: 0.4;
        }
    </style>

    <div class="glow"></div>

    <div class="container">
        <div class="card">

            <!-- TOP -->
            <div class="topbar">
                <h2>💬 All Comments</h2>
                <div>
                    <input type="text" class="search" placeholder="Search comments...">
                    <button class="toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
                </div>
            </div>

            <!-- TABLE WITH SCROLL -->
            <div class="table-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>S.No</th>
                        <th>Post Title</th>
                        <th>Commenter</th>
                        <th>Email</th>
                        <th>Comment</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>

                    <!-- Thymeleaf loop will replace this when backend is ready -->

                    <tr th:each="comment, stat : ${commentPage.content}">
                        <td th:text="${stat.count}"></td>

                        <td><div class="truncate" th:text="${comment.postTitle}"></div></td>
                        <td th:text="${comment.name}"></td>
                        <td th:text="${comment.email}"></td>
                        <td><div class="truncate" th:text="${comment.commentMsg}"></div></td>
                        <td th:text="${#temporals.format(comment.createdOn, 'dd-MMM-yyyy hh:mm a')}"></td>
                        <td>
                            <div class="actions">
                                <div class="action-btn delete" data-title="Delete" th:onclick="'confirmDelete(' + ${comment.id} + ',' + ${currentPage} + ');'" style="cursor:pointer;">
                                    <i class="fa-solid fa-trash"></i>
                                </div>
                            </div>
                        </td>
                    </tr>

                    </tbody>
                </table>
            </div>

            <!-- Pagination dummy

            <div class="pagination-container">
                <ul class="pagination">
                     Previous ---
                    <li class="disabled"><a href="#">⟨</a></li>
                     Page Numbers --
                    <li class="active"><a href="#">1</a></li>
                    <li><a href="#">2</a></li>
                    <li><a href="#">3</a></li>
                     Next --
                    <li><a href="#">⟩</a></li>
                </ul>
            </div> -->

            <div class="pagination-container" th:if="${commentPage.totalPages > 1}">
                <ul class="pagination">
                    <li th:classappend="${currentPage == 0} ? 'disabled'">
                        <a th:href="@{/blogdashborad/admin/allcomment(pageNo=${currentPage - 1})}">⟨</a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, commentPage.totalPages - 1)}"
                        th:classappend="${currentPage == i} ? 'active'">
                        <a th:href="@{/blogdashborad/admin/allcomment(pageNo=${i})}" th:text="${i + 1}"></a>
                    </li>
                    <li th:classappend="${currentPage == commentPage.totalPages - 1} ? 'disabled'">
                        <a th:href="@{/blogdashborad/admin/allcomment(pageNo=${currentPage + 1})}">⟩</a>
                    </li>
                </ul>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // Theme Toggle
        const themeBtn = document.getElementById('themeBtn');
        if(localStorage.getItem("theme")==="dark"){
            document.body.classList.add("dark");
            themeBtn.innerText="☀️";
        }
        function toggleTheme(){
            document.body.classList.toggle("dark");
            if(document.body.classList.contains("dark")){
                localStorage.setItem("theme","dark");
                themeBtn.innerText="☀️";
            } else {
                localStorage.setItem("theme","light");
                themeBtn.innerText="🌙";
            }
        }

        // Delete Confirmation
         function confirmDelete(id, pageNo){
            Swal.fire({
                   title: 'Are you sure?',
                   text: "You won't be able to revert this!",
                   icon: 'warning',
                   showCancelButton: true,
                   confirmButtonColor: '#ef4444',
                   cancelButtonColor: '#6b7280',
                   confirmButtonText: 'Yes, delete it!'
                   }).then((result) => {
                     if (result.isConfirmed) {
                      window.location.href = '/blogdashborad/admin/delete/' + id + '?pageNo=' + pageNo;
                   }
           })
         }

    </script>

</section>
</body>
</html>
